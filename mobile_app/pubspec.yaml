name: vahinav
description: VahiNav - Passive Activity Tracking for NATPAC

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_background_service: ^5.1.0

  flutter_activity_recognition: ^3.1.0

  geolocator: ^10.1.1

  permission_handler: ^11.4.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

  provider: ^6.1.5

  http: ^1.2.0

  logger: ^2.0.0

  connectivity_plus: ^6.1.5

  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/
