name: path_sathi
description: AI-Powered Travel Activity & Automated Trip Chain Logger for NATPAC.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Background service - runs headless Dart instance even after app swipe-away
  flutter_background_service: ^5.0.0

  # Activity recognition - connects to Google Fit / Apple Health sensors
  flutter_activity_recognition: ^3.0.0

  # High-accuracy GPS with distance-based filtering for battery efficiency
  geolocator: ^10.0.0

  # Permission management (locationAlways, activityRecognition, notification, battery)
  permission_handler: ^11.0.0

  # Offline buffer - stores breadcrumbs when network is unavailable
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # FCM push notifications for Smart Nudge surveys
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # State management
  provider: ^6.1.2

  # HTTP client for syncing with Node.js backend
  http: ^1.2.0

  # Connectivity monitoring
  connectivity_plus: ^6.0.0

  # UUID generation for trip IDs
  uuid: ^4.4.0

  # Environment configuration (no hardcoded URLs)
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
